<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xianxia-td</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        /* Prevent native dragging and selection for better game feel */
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-user-drag: none;
      }
      canvas {
        display: block;
        touch-action: none;
        outline: none;
      }
      #game-container {
        position: relative;
        width: 800px;
        height: 600px;
        transform-origin: center center;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-D-bfv-bo.js"></script>
  </head>
  <body>
    <div id="game-container">
      <div id="app"></div>
      <div id="ui-root" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></div>
    </div>
    <script>
      function resize() {
        const container = document.getElementById('game-container');
        const scale = Math.min(window.innerWidth / 800, window.innerHeight / 600);
        container.style.transform = `scale(${scale})`;
      }
      window.addEventListener('resize', resize);
      resize();
    </script>
  </body>
</html>
